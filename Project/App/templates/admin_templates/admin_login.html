{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ---------- Background ---------- */
    body {
      background: linear-gradient(rgba(116, 235, 213, 0.4), rgba(172, 182, 229, 0.4)),
                  url("https://images.unsplash.com/photo-1521790361543-f645cf042ec3") no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }

    /* ---------- Card ---------- */
    .card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.25);
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 40px;
      width: 100%;
      max-width: 450px;
      animation: fadeIn 1s ease-in-out;
    }

    /* ---------- Animation ---------- */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Header ---------- */
    h3 {
      text-align: center;
      font-weight: 700;
      color: #007bff;
      margin-bottom: 25px;
    }

    /* ---------- Form Fields ---------- */
    input {
      border-radius: 10px !important;
      border: 1px solid #ccc;
      padding: 10px;
      width: 100%;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #007bff;
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
      outline: none;
    }

    /* ---------- Button ---------- */
    .btn-custom {
      background: linear-gradient(45deg, #007bff, #00b4db);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 4px 10px rgba(0, 123, 255, 0.4);
    }

    .btn-custom:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #00b4db, #007bff);
    }

    /* ---------- Alert ---------- */
    .alert {
      border-radius: 10px;
      margin-bottom: 15px;
    }

    /* ---------- Link ---------- */
    .register-link {
      text-align: center;
      margin-top: 15px;
      color: #333;
    }

    .register-link a {
      color: #007bff;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>Admin Login</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-custom w-100 mt-3">Login</button>
    </form>

    <div class="register-link">
      Don’t have an account? <a href="{% url 'admin-register' %}">Register here</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
