      background-size: cover;
      padding: 20px;
    }

    #FormContainer {
      width: 800px;
      background-color: #84a9b8a1;
      backdrop-filter: blur(10px);
      border: 2px solid #ffffff6d;
      border-radius: 10px;
      box-shadow: 3px 3px 11px 1.5px #0000002b;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .ImgContainer {
      background: url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fGVtcGxveWVlfGVufDB8MXwwfHx8MA%3D%3D&auto=format&fit=crop&q=60&w=500') no-repeat center center;
      background-size: cover;
      border-radius: 10px 0 0 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 30px;
      overflow-y: auto;
    }

    form h2 {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
    }

    .input-div {
      margin-bottom: 15px;
      position: relative;
    }

    .input-div label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 5px;
    }

    .input-div input {
      width: 100%;
      padding: 10px 40px 10px 10px;
      font-size: 0.9rem;
      border-radius: 8px;
      border: none;
      background-color: #ffffff6d;
      color: #000;
    }

    .input-div input:focus {
      outline: 2px solid #fff;
    }

    .input-div i.toggle-password {
      position: absolute;
      top: 36px;
      right: 15px;
      cursor: pointer;
      color: #333;
    }

    form button {
      align-self: center;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      font-size: 1rem;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
    }

    form button:hover {
      background-color: #e9d38c;
      color: #000;
    }

    .links {
      margin-top: 15px;
      text-align: center;
    }

    .links a {
      color: #fff;
      font-size: 0.9rem;
    }

    .alert {
      font-size: 0.85rem;
    }

    @media (max-width: 800px) {
      #FormContainer {
        grid-template-columns: 1fr;
        width: 95%;
        height: auto;
        border-radius: 10px;
      }

      .ImgContainer {
        display: none;
      }

      form {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div id="FormContainer">
    <div class="ImgContainer"></div>
    <form method="POST">
      {% csrf_token %}
      {% if form.errors %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <div id="form_errors">
          {% for key, value in form.errors.items %}
            <strong style="color: darksalmon;">{{ value }}</strong><br>
          {% endfor %}
        </div>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      {% endif %}

      <h2>REGISTER</h2>

      <div class="input-div">
        <label for="id_first_name">First Name</label>
        {{ form.first_name }}
      </div>

      <div class="input-div">
        <label for="id_last_name">Last Name</label>
        {{ form.last_name }}
      </div>

      <div class="input-div">
        <label for="id_email">Email</label>
        {{ form.email }}
      </div>

      <div class="input-div">
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>

      <div class="input-div">
        <label for="password1">Password</label>
        <input type="password" name="password1" id="password1" minlength="9" required />
        <i class="fas fa-eye toggle-password" toggle="#password1"></i>
      </div>

      <div class="input-div">
        <label for="password2">Confirm Password</label>
        <input type="password" name="password2" id="password2" minlength="9" required />
        <i class="fas fa-eye toggle-password" toggle="#password2"></i>
      </div>

      <button type="submit">Register</button>

      <div class="links">
        <a href="{% url 'login' %}">Already have an account? Login</a>
      </div>
    </form>
  </div>

  <script>
    document.querySelectorAll(".toggle-password").forEach(function (item) {
      item.addEventListener("click", function () {
        const targetInput = document.querySelector(this.getAttribute("toggle"));
        const type = targetInput.getAttribute("type") === "password" ? "text" : "password";
        targetInput.setAttribute("type", type);
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
      });
    });
  </script>

  <!-- Bootstrap JS for alert close -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
