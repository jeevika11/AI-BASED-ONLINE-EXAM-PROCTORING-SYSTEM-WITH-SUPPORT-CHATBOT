    #FormContainer {
      border: 2px solid rgba(255, 255, 255, 0.4);
      width: 760px;
      border-radius: 15px;
      box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 30px;
      align-items: center;
      height: 550px;
      background: linear-gradient(135deg, #a8dadc, #f1faee);
      animation: fadeIn 1.5s ease-out;
      transform: scale(1);
      transition: transform 0.3s ease-in-out;
    }

    #FormContainer:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #FormContainer input,
    #FormContainer select,
    #FormContainer button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.3);
      color: #333;
      font-size: 14px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    #FormContainer input:focus,
    #FormContainer select:focus,
    #FormContainer button:hover {
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
    }

    #FormContainer button {
      background-color: #f1faee;
      color: #333;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #FormContainer button:hover {
      background-color: #a8dadc;
    }

    h1 {
      color: #34495e;
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      grid-column: span 2;
      margin-bottom: 20px;
    }

    .ImgContainer {
      border-radius: 10px;
      background: url('https://plus.unsplash.com/premium_photo-1661587727551-7f7aac005fe3?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8ZW1wbG95ZWV8ZW58MHwxfDB8fHww&auto=format&fit=crop&q=60&w=500') no-repeat center center;
      background-size: cover;
      height: 100%;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    form .form-group {
      margin-bottom: 15px;
      position: relative;
    }

    form label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #34495e;
      margin-bottom: 5px;
    }

    form input,
    form select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ced4da;
      background-color: #fff;
      width: 100%;
      outline: none;
      color: #495057;
      margin-bottom: 10px;
      transition: border-color 0.3s;
    }

    form input:focus,
    form select:focus {
      border-color: #007bff;
    }

    form button {
      align-self: center;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 1.1rem;
      color: #fff;
      background-color: #007bff;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    form button:hover {
      background-color: #0056b3;
    }

    .links {
      text-align: center;
      margin-top: 10px;
    }

    .links a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }

    @media (max-width: 800px) {
      .ImgContainer {
        display: none;
      }

      #FormContainer {
        grid-template-columns: 1fr;
        width: 90%;
      }
    }

    @media (max-width: 430px) {
      #FormContainer {
        width: 100%;
        border-radius: 0;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div id="FormContainer">
    <form method="POST">
      {% csrf_token %}

      <!-- ✅ Show Django messages (like "Customer accounts cannot log in here") -->
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning" role="alert" style="color: darkred; text-align: center; margin-bottom: 15px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <!-- ✅ Show form validation errors -->
      {% if form.errors %}
        <div class="alert alert-danger alert-dismissible" role="alert">
          <div id="form_errors">
            {% for key, value in form.errors.items %}
              <strong style="color: darksalmon;">{{ value }}</strong>
            {% endfor %}
          </div>
        </div>
      {% endif %}

      <h1>Login</h1>

      <div class="form-group">
        <label for="username">Username</label>
        {{ form.username }}
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        {{ form.password }}
        <i class="fa fa-eye toggle-password" onclick="togglePassword(this)"></i>
      </div>

      <button type="submit">Login</button>

      <div class="links">
        <a href="{% url 'users-register' %}">Create an Account</a>
      </div>
    </form>
    <div class="ImgContainer"></div>
  </div>

  <script>
    function togglePassword(element) {
      const input = element.previousElementSibling;
      if (input.type === "password") {
        input.type = "text";
        element.classList.remove("fa-eye");
        element.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        element.classList.remove("fa-eye-slash");
        element.classList.add("fa-eye");
      }
    }
  </script>
</body>
